<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Gambar</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181a24;
      --card: #1e2030;
      --border: #2a2d40;
      --fg: #e8e9ed;
      --muted: #7a7e94;
      --accent: #e8753a;
      --accent-hover: #f08a52;
      --accent-glow: rgba(232, 117, 58, 0.25);
      --danger: #e84057;
      --success: #34c77b;
      --radius: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ========== BACKGROUND ATMOSPHERE ========== */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    .bg-blob-1 {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -150px; right: -100px;
      opacity: 0.12;
      animation: blobFloat 12s ease-in-out infinite;
    }
    .bg-blob-2 {
      width: 400px; height: 400px;
      background: #3a6ee8;
      bottom: -120px; left: -80px;
      opacity: 0.08;
      animation: blobFloat 15s ease-in-out infinite reverse;
    }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* ========== TRIGGER BUTTON ========== */
    .trigger-btn {
      position: relative;
      z-index: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 16px 36px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 24px var(--accent-glow);
    }
    .trigger-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }
    .trigger-btn:active {
      transform: translateY(0) scale(0.97);
    }
    .trigger-btn i {
      font-size: 18px;
    }

    /* ========== OVERLAY ========== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 6, 12, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ========== POPUP ========== */
    .popup {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 440px;
      max-width: 92vw;
      padding: 0;
      position: relative;
      transform: translateY(30px) scale(0.92);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
      overflow: hidden;
    }
    .overlay.active .popup {
      transform: translateY(0) scale(1);
    }

    /* Header */
    .popup-header {
      padding: 24px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .popup-header h2 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--fg);
    }
    .close-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }
    .close-btn:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
      transform: rotate(90deg);
    }

    /* Body */
    .popup-body {
      padding: 24px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ========== DROP ZONE ========== */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      min-height: 180px;
    }
    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(232, 117, 58, 0.04);
    }
    .drop-zone:hover::before,
    .drop-zone.dragover::before {
      opacity: 1;
    }
    .drop-zone.dragover {
      transform: scale(1.01);
    }

    .drop-zone-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(232, 117, 58, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 22px;
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }
    .drop-zone:hover .drop-zone-icon {
      transform: translateY(-3px);
    }
    .drop-zone-text {
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .drop-zone-text p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .drop-zone-text span {
      color: var(--accent);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .drop-zone-hint {
      font-size: 12px;
      color: var(--muted);
      opacity: 0.6;
      position: relative;
      z-index: 1;
    }

    /* Hidden file input */
    .file-input {
      display: none;
    }

    /* ========== PREVIEW ========== */
    .preview-container {
      display: none;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      position: relative;
      animation: previewIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .preview-container.show {
      display: block;
    }
    @keyframes previewIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .preview-image-wrapper {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: repeating-conic-gradient(var(--border) 0% 25%, transparent 0% 50%) 0 0 / 16px 16px;
      overflow: hidden;
    }
    .preview-image-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .preview-remove {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }
    .preview-remove:hover {
      background: var(--danger);
      border-color: var(--danger);
      transform: scale(1.1);
    }
    .preview-info {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--border);
    }
    .preview-info-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(232, 117, 58, 0.1);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .preview-info-text {
      flex: 1;
      min-width: 0;
    }
    .preview-info-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-info-size {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ========== INPUT FIELD ========== */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.3px;
    }
    .field-input {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      outline: none;
      transition: all 0.25s ease;
      width: 100%;
    }
    .field-input::placeholder {
      color: var(--muted);
      opacity: 0.5;
    }
    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ========== FOOTER ========== */
    .popup-footer {
      padding: 0 28px 24px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-ghost {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: var(--border);
      color: var(--fg);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    .btn-primary:active {
      transform: translateY(0) scale(0.97);
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ========== TOAST ========== */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 240px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast i.success { color: var(--success); }
    .toast i.error { color: var(--danger); }
    .toast.out {
      animation: toastOut 0.3s ease forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(40px) scale(0.9); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes toastOut {
      to { opacity: 0; transform: translateX(40px) scale(0.9); }
    }

    /* ========== PARTICLE DECORATION ========== */
    .particle {
      position: fixed;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ========== RESPONSIF ========== */
    @media (max-width: 480px) {
      .popup { border-radius: 16px; }
      .popup-header { padding: 20px 20px 0; }
      .popup-body { padding: 20px; }
      .popup-footer { padding: 0 20px 20px; }
      .drop-zone { padding: 24px 16px; min-height: 150px; }
    }

    /* ========== REDUCED MOTION ========== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Latar belakang atmosfer -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <!-- Tombol pembuka popup -->
  <button class="trigger-btn" id="openPopup" aria-label="Upload gambar">
    <i class="fa-solid fa-cloud-arrow-up"></i>
    Upload Gambar
  </button>

  <!-- Overlay & Popup -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="popup">
      <!-- Header -->
      <div class="popup-header">
        <h2 id="popupTitle">Upload Gambar</h2>
        <button class="close-btn" id="closePopup" aria-label="Tutup popup">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Body -->
      <div class="popup-body">
        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="Area unggah gambar">
          <div class="drop-zone-icon">
            <i class="fa-solid fa-image"></i>
          </div>
          <div class="drop-zone-text">
            <p>Seret & lepas gambar di sini</p>
            <p>atau <span>klik untuk memilih file</span></p>
          </div>
          <div class="drop-zone-hint">PNG, JPG, GIF, WEBP — Maks 5MB</div>
          <input type="file" class="file-input" id="fileInput" accept="image/*" aria-hidden="true">
        </div>

        <!-- Preview -->
        <div class="preview-container" id="previewContainer">
          <div class="preview-image-wrapper">
            <img id="previewImage" src="" alt="Preview gambar">
          </div>
          <button class="preview-remove" id="removeFile" aria-label="Hapus gambar">
            <i class="fa-solid fa-xmark"></i>
          </button>
          <div class="preview-info">
            <div class="preview-info-icon"><i class="fa-solid fa-file-image"></i></div>
            <div class="preview-info-text">
              <div class="preview-info-name" id="fileName"></div>
              <div class="preview-info-size" id="fileSize"></div>
            </div>
          </div>
        </div>

        <!-- Nama Gambar -->
        <div class="field-group">
          <label class="field-label" for="imageName">Nama Gambar</label>
          <input type="text" class="field-input" id="imageName" placeholder="Masukkan nama gambar..." maxlength="80" autocomplete="off">
        </div>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <button class="btn btn-ghost" id="cancelBtn">Batal</button>
        <button class="btn btn-primary" id="uploadBtn" disabled>
          <i class="fa-solid fa-arrow-up-from-bracket"></i>
          Upload
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ========== ELEMEN DOM ==========
    const openPopup = document.getElementById('openPopup');
    const overlay = document.getElementById('overlay');
    const closePopup = document.getElementById('closePopup');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const previewImage = document.getElementById('previewImage');
    const removeFile = document.getElementById('removeFile');
    const fileNameEl = document.getElementById('fileName');
    const fileSizeEl = document.getElementById('fileSize');
    const imageName = document.getElementById('imageName');
    const uploadBtn = document.getElementById('uploadBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const toastContainer = document.getElementById('toastContainer');

    // ========== STATE ==========
    let selectedFile = null;

    // ========== BUKA/TUTUP POPUP ==========
    function showPopup() {
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      // Fokus ke input nama setelah animasi
      setTimeout(() => imageName.focus(), 400);
    }

    function hidePopup() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      resetForm();
    }

    openPopup.addEventListener('click', showPopup);
    closePopup.addEventListener('click', hidePopup);
    cancelBtn.addEventListener('click', hidePopup);

    // Tutup dengan klik overlay
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) hidePopup();
    });

    // Tutup dengan Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) hidePopup();
    });

    // ========== DRAG & DROP ==========
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });

    // Mencegah perilaku default drag
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
      dropZone.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
      });
    });

    // Highlight saat drag
    ['dragenter', 'dragover'].forEach(evt => {
      dropZone.addEventListener(evt, () => dropZone.classList.add('dragover'));
    });
    ['dragleave', 'drop'].forEach(evt => {
      dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'));
    });

    // Handle drop
    dropZone.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });

    // Handle klik pilih file
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    // ========== HANDLER FILE ==========
    function handleFile(file) {
      // Validasi tipe
      const validTypes = ['image/png', 'image/jpeg', 'image/gif', 'image/webp'];
      if (!validTypes.includes(file.type)) {
        showToast('Format file tidak didukung', 'error');
        return;
      }

      // Validasi ukuran (5MB)
      if (file.size > 5 * 1024 * 1024) {
        showToast('Ukuran file melebihi 5MB', 'error');
        return;
      }

      selectedFile = file;

      // Preview gambar
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImage.src = e.target.result;
        fileNameEl.textContent = file.name;
        fileSizeEl.textContent = formatSize(file.size);

        // Sembunyikan drop zone, tampilkan preview
        dropZone.style.display = 'none';
        previewContainer.classList.add('show');

        // Isi nama gambar otomatis dari nama file (tanpa ekstensi)
        if (!imageName.value.trim()) {
          const nameWithoutExt = file.name.replace(/\.[^/.]+$/, '');
          imageName.value = nameWithoutExt;
        }

        updateUploadBtn();
      };
      reader.readAsDataURL(file);
    }

    // Hapus file
    removeFile.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      previewImage.src = '';
      previewContainer.classList.remove('show');
      dropZone.style.display = '';
      updateUploadBtn();
    });

    // ========== VALIDASI & UPLOAD ==========
    function updateUploadBtn() {
      const hasFile = selectedFile !== null;
      const hasName = imageName.value.trim().length > 0;
      uploadBtn.disabled = !(hasFile && hasName);
    }

    imageName.addEventListener('input', updateUploadBtn);

    uploadBtn.addEventListener('click', () => {
      if (uploadBtn.disabled) return;

      const name = imageName.value.trim();
      
      // Simulasi upload — animasi loading pada tombol
      uploadBtn.disabled = true;
      uploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengupload...';

      setTimeout(() => {
        showToast(`"${name}" berhasil diupload!`, 'success');
        hidePopup();
      }, 1200);
    });

    // ========== RESET FORM ==========
    function resetForm() {
      selectedFile = null;
      fileInput.value = '';
      previewImage.src = '';
      previewContainer.classList.remove('show');
      dropZone.style.display = '';
      imageName.value = '';
      uploadBtn.disabled = true;
      uploadBtn.innerHTML = '<i class="fa-solid fa-arrow-up-from-bracket"></i> Upload';
    }

    // ========== TOAST ==========
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon} ${type}"></i> ${message}`;
      toastContainer.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('out');
        toast.addEventListener('animationend', () => toast.remove());
      }, 2800);
    }

    // ========== UTILITAS ==========
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    // ========== PARTIKEL DEKORATIF ==========
    function createParticles() {
      const count = 20;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const size = 2 + Math.random() * 3;
        const dur = 6 + Math.random() * 8;
        const delay = Math.random() * 6;
        p.style.cssText = `
          left: ${x}%;
          top: ${y}%;
          width: ${size}px;
          height: ${size}px;
          animation: particleDrift ${dur}s ${delay}s ease-in-out infinite;
        `;
        document.body.appendChild(p);
      }

      // Tambah keyframe partikel
      const style = document.createElement('style');
      style.textContent = `
        @keyframes particleDrift {
          0%, 100% { opacity: 0; transform: translate(0, 0); }
          25% { opacity: 0.4; }
          50% { opacity: 0.2; transform: translate(${20 - Math.random() * 40}px, ${-30 - Math.random() * 30}px); }
          75% { opacity: 0.3; }
        }
      `;
      document.head.appendChild(style);
    }
    createParticles();
  </script>
</body>
</html>
