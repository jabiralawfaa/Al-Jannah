<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Memuat...</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html,body { height: 100%; }
body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0f1a17; font-family: 'Poppins', system-ui, sans-serif;
    min-height: 100vh;
}
.prel-spinner { position: relative; width: 80px; height: 80px; }
.prel-spinner .ring-bg { position: absolute; inset: 0; border-radius: 50%; border: 4px solid rgba(255,255,255,0.1); }
.prel-spinner .ring-outer { position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; border-top-color: #C8A45C; border-right-color: #16423C; animation: prelSpin .8s linear infinite; }
.prel-spinner .ring-inner { position: absolute; inset: 8px; border-radius: 50%; border: 3px solid transparent; border-bottom-color: #C8A45C; border-left-color: #16423C; animation: prelSpin .6s linear infinite reverse; }
.prel-text { margin-top: 24px; color: #C8A45C; font-size: 14px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; animation: prelPulse 1.5s ease-in-out infinite; }
@keyframes prelSpin { to { transform: rotate(360deg); } }
@keyframes prelPulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }
.prel-error { display: none; text-align: center; padding: 2rem; color: #fff; }
.prel-error h2 { color: #e74c3c; font-size: 1.25rem; margin-bottom: .5rem; }
.prel-error p { color: #aaa; font-size: 0.875rem; }
.prel-error button {
    margin-top: 1rem; padding: 8px 24px; background: #16423C; color: #fff;
    border: 1px solid #C8A45C; border-radius: 8px; cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>
<div id="page-preloader">
    <div class="prel-spinner">
        <div class="ring-bg"></div>
        <div class="ring-outer"></div>
        <div class="ring-inner"></div>
    </div>
    <div class="prel-text">Memuat...</div>
</div>
<div id="prel-error" class="prel-error">
    <h2>Gagal memuat halaman</h2>
    <p>Koneksi terputus atau server sedang sibuk.</p>
    <button onclick="location.reload()">Coba Lagi</button>
</div>
<script>
(function() {
    var targetUrl = location.href;
    var sep = targetUrl.indexOf('?') > -1 ? '&' : '?';
    targetUrl = targetUrl + sep + '__preloader_bypass=1';

    var xhr = new XMLHttpRequest();
    xhr.open('GET', targetUrl, true);
    xhr.timeout = 60000;
    xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 400) {
            var ct = (xhr.getResponseHeader('Content-Type') || '').toLowerCase();
            if (ct.indexOf('text/html') === -1) {
                location.reload();
                return;
            }
            try { sessionStorage.setItem('preloader_hydrated', '1'); } catch(e) {}
            document.open();
            document.write(xhr.responseText);
            document.close();
        } else {
            showError();
        }
    };
    xhr.onerror = showError;
    xhr.ontimeout = showError;
    xhr.send();

    function showError() {
        document.getElementById('page-preloader').style.display = 'none';
        document.getElementById('prel-error').style.display = 'block';
    }
})();
</script>
</body>
</html>
